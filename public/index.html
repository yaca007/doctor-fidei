<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Fidei</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px;
      text-align: center;
      background: rgba(15, 23, 42, 0.95);
      font-size: 24px;
      font-weight: bold;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      max-width: 900px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .user {
      background: #1d4ed8;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
      margin-right: auto;
    }

    #inputArea {
      display: flex;
      gap: 10px;
      padding: 14px;
      background: #111827;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #08130b;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <header> Doctor Fidei — Asistente del Magisterio</header>

  <div id="chat">
    <div class="message bot">Bienvenido. Haz una pregunta sobre doctrina, Magisterio, Biblia o Catecismo.</div>
  </div>

  <div id="inputArea">
    <input id="question" placeholder="Escribe tu pregunta..." />
    <button onclick="sendMessage()">Enviar</button>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("question");
      const chat = document.getElementById("chat");
      const question = input.value.trim();

      if (!question) return;

      chat.innerHTML += `<div class="message user">${question}</div>`;
      input.value = "";
      chat.innerHTML += `<div class="message bot" id="thinking">Pensando...</div>`;
      chat.scrollTop = chat.scrollHeight;

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: question })
        });

        const data = await response.json();
        const thinking = document.getElementById("thinking");
        if (thinking) thinking.remove();

        chat.innerHTML += `<div class="message bot">${data.reply || data.error || "Sin respuesta."}</div>`;
        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        const thinking = document.getElementById("thinking");
        if (thinking) thinking.remove();
        chat.innerHTML += `<div class="message bot">Error al conectar con el servidor.</div>`;
      }
    }

    document.getElementById("question").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
